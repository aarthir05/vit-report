<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027"/>
      <stop offset="50%" style="stop-color:#203a43"/>
      <stop offset="100%" style="stop-color:#2c5364"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a4a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16303e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="greenBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#11998e"/>
      <stop offset="100%" style="stop-color:#38ef7d"/>
    </linearGradient>
    <linearGradient id="redBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#eb3349"/>
      <stop offset="100%" style="stop-color:#f45c43"/>
    </linearGradient>
    <linearGradient id="blueBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4776e6"/>
      <stop offset="100%" style="stop-color:#8e54e9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bgGrad)"/>

  <!-- Decorative circles -->
  <circle cx="530" cy="80" r="120" fill="#38ef7d" opacity="0.04"/>
  <circle cx="70" cy="520" r="100" fill="#4776e6" opacity="0.06"/>

  <!-- Main card -->
  <rect x="40" y="130" width="520" height="340" rx="20" ry="20" fill="url(#cardGrad)" filter="url(#shadow)"/>

  <!-- Card top accent line -->
  <rect x="40" y="130" width="520" height="5" rx="3" fill="url(#greenBar)"/>

  <!-- Dollar icon circle -->
  <circle cx="300" cy="80" r="38" fill="#11998e" opacity="0.15"/>
  <circle cx="300" cy="80" r="30" fill="#11998e" opacity="0.25"/>
  <text x="300" y="92" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#38ef7d" text-anchor="middle">$</text>

  <!-- Title -->
  <text x="300" y="185" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">BUDGET TRACKER</text>

  <!-- Subtitle -->
  <text x="300" y="215" font-family="Arial, sans-serif" font-size="14" fill="#8ecae6" text-anchor="middle" letter-spacing="2">EXCEL TEMPLATE</text>

  <!-- Divider -->
  <line x1="80" y1="232" x2="520" y2="232" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Bar chart section -->
  <!-- Label: Income -->
  <text x="80" y="268" font-family="Arial, sans-serif" font-size="13" fill="#8ecae6">Income</text>
  <rect x="160" y="255" width="260" height="16" rx="8" fill="#ffffff" opacity="0.07"/>
  <rect x="160" y="255" width="260" height="16" rx="8" fill="url(#greenBar)"/>
  <text x="432" y="268" font-family="Arial, sans-serif" font-size="13" fill="#38ef7d" font-weight="bold">₹85,000</text>

  <!-- Label: Expenses -->
  <text x="80" y="308" font-family="Arial, sans-serif" font-size="13" fill="#8ecae6">Expenses</text>
  <rect x="160" y="295" width="195" height="16" rx="8" fill="#ffffff" opacity="0.07"/>
  <rect x="160" y="295" width="195" height="16" rx="8" fill="url(#redBar)"/>
  <text x="432" y="308" font-family="Arial, sans-serif" font-size="13" fill="#f45c43" font-weight="bold">₹53,200</text>

  <!-- Label: Savings -->
  <text x="80" y="348" font-family="Arial, sans-serif" font-size="13" fill="#8ecae6">Savings</text>
  <rect x="160" y="335" width="120" height="16" rx="8" fill="#ffffff" opacity="0.07"/>
  <rect x="160" y="335" width="120" height="16" rx="8" fill="url(#blueBar)"/>
  <text x="432" y="348" font-family="Arial, sans-serif" font-size="13" fill="#8e54e9" font-weight="bold">₹31,800</text>

  <!-- Divider -->
  <line x1="80" y1="370" x2="520" y2="370" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Feature pills -->
  <rect x="68" y="385" width="138" height="28" rx="14" fill="#11998e" opacity="0.15"/>
  <text x="137" y="404" font-family="Arial, sans-serif" font-size="12" fill="#38ef7d" text-anchor="middle">✓ Auto Calculations</text>

  <rect x="220" y="385" width="110" height="28" rx="14" fill="#4776e6" opacity="0.15"/>
  <text x="275" y="404" font-family="Arial, sans-serif" font-size="12" fill="#8e94e9" text-anchor="middle">✓ Visual Charts</text>

  <rect x="344" y="385" width="120" height="28" rx="14" fill="#eb3349" opacity="0.12"/>
  <text x="404" y="404" font-family="Arial, sans-serif" font-size="12" fill="#f45c43" text-anchor="middle">✓ Google Sheets</text>

  <!-- Second row pills -->
  <rect x="120" y="422" width="130" height="28" rx="14" fill="#203a43" opacity="0.8"/>
  <text x="185" y="441" font-family="Arial, sans-serif" font-size="12" fill="#8ecae6" text-anchor="middle">✓ Monthly Reports</text>

  <rect x="270" y="422" width="150" height="28" rx="14" fill="#203a43" opacity="0.8"/>
  <text x="345" y="441" font-family="Arial, sans-serif" font-size="12" fill="#8ecae6" text-anchor="middle">✓ Category Tracking</text>

  <!-- Bottom price tag -->
  <rect x="220" y="500" width="160" height="50" rx="25" fill="#11998e"/>
  <text x="300" y="521" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" opacity="0.85">GET IT FOR JUST</text>
  <text x="300" y="542" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">$7 / ₹500</text>
</svg>
